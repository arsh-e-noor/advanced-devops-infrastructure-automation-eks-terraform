apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-app
spec:
  replicas: 1

  strategy:
    type: Recreate   

  selector:
    matchLabels:
      app: blog-app

  template:
    metadata:
      labels:
        app: blog-app

    spec:
      containers:
      - name: blog-app
        image: arshen00r/blog-app:latest

        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "50m"        
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"